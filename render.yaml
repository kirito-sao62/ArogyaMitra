services:
  # Backend API service
  - type: web
    name: arogyamitra-api
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: PDF_PATH
        value: data/medical_book.pdf
      - key: PYTHONPATH
        value: /app

  # Frontend static service
  - type: web
    name: arogyamitra-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: arogyamitra-api
          type: web
          property: host